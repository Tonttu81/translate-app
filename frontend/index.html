<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Translator</title>
</head>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    }

    h2 {

    }

    select {
        width: 100px;
    }

    input {
        margin: 10px;
    }

    .flex {
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 600px;
        height: 500px;
        background-color: #fdfdfd;
        border-radius: 10px;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .input {
        width: 300px;
        height: 100px;
        margin: 30px;
        padding: 5px;
        resize: none;

        border-style: solid;
        border-width: 1px;
        border-radius: 5px;
        border-color: #646464;

        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    }

    #translation {
        width: 300px;
        height: 100px;
        margin: 30px;
        padding: 5px;

        background-color: white;

        border-style: solid;
        border-width: 1px;
        border-radius: 5px;
        border-color: #646464;
    }
</style>

<body>
    <div class="flex">
        <div class="container">   
            <h2>Translate text</h2>
            <textarea class="input" name="text" id="text" wrap="soft"></textarea>
            
            <div>
                Translate to
                <select name="languages" id="languages">
                    <option value="en">English</option>
                    <option value="fi">Finnish</option>
                    <option value="sv">Swedish</option>
                    <option value="et">Estonian</option>
                    <option value="de">German</option>
                    <option value="pl">Polish</option>
                    <option value="nl">Dutch</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="ja">Japanese</option>
                    <option value="zh-Hans">Chinese Simplified</option>
                    <option value="ko">Korean</option>
                    <option value="hi">Hindi</option>
                </select> 
            </div>
            <input type="button" value="Translate" onClick="translateText()">
            <div id="translation"></div>
        </div>
    </div>
    
    
    <script>
        const translation = document.getElementById('translation');
        const textArea = document.getElementById('text');
        const langDropdown = document.getElementById('languages');

        function translateText() {
            const text = textArea.value;
            const lang = langDropdown.value;

            fetch('/api/translate', {
                method: "POST",
                body: JSON.stringify({
                    text: text,
                    lang: lang
                }),
                headers: {
                    "Content-Type": "application/json"
                }
            })
                .then((response) => response.json())
                .then((json) => {
                    translation.textContent = json.translation;
                });
        }
    </script>
</body>

</html>
