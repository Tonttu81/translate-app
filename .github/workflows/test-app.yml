name: Run backend tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run containers
        run: |
          docker compose -f docker-compose.dev.yml up --build -d
      
      - name: Test backend health
        run: |
          curl http://localhost:8080/api/status      